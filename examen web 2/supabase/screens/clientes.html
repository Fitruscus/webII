<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Administración de Clientes - CineSystem</title>
    <link rel="stylesheet" href="../css/estilos.css">
</head>
<body>
    <header>
        <nav class="navegacion">
            <div class="logo">CineSystem</div>
            <ul class="menu">
                <li><a href="index.html">Inicio</a></li>
                <li><a href="peliculas.html">Peliculas</a></li>
                <li><a href="salas.html">Salas</a></li>
                <li><a href="clientes.html" class="activo">Clientes</a></li>
                <li><a href="boletos.html">Boletos</a></li>
                <li><a href="asignaciones.html">Asignaciones</a></li>
                <li><a href="funciones.html">Funciones</a></li>
            </ul>
        </nav>
    </header>

    <main>
        <section class="seccion activo">
            <div class="contenedor-crud">
                <h2>Administración de Clientes</h2>
                
                <!-- Formulario de registro -->
                <div class="contenedor-formulario">
                    <h3>Registrar Cliente</h3>
                    <form id="form-clientes">
                        <div class="form-group">
                            <label for="nombre">Nombre</label>
                            <input type="text" id="nombre" name="nombre" required>
                        </div>
                        <div class="form-group">
                            <label for="apellido">Apellido</label>
                            <input type="text" id="apellido" name="apellido" required>
                        </div>
                        <div class="form-group">
                            <label for="dni">DNI</label>
                            <input type="text" id="dni" name="dni" required>
                        </div>
                        <div class="form-group">
                            <label for="telefono">Teléfono</label>
                            <input type="tel" id="telefono" name="telefono">
                        </div>
                        <div class="form-group">
                            <label for="email">Email</label>
                            <input type="email" id="email" name="email" required>
                        </div>
                        <button type="submit" class="btn-guardar">Guardar</button>
                        <p id="mensaje" class="mensaje"></p>
                    </form>
                </div>
            <div class="tabla">
                <table class="tabla-clientes">
                    <thead>
                        <tr>
                            <th>ID</th>
                            <th>Nombre</th>
                            <th>Apellido</th>
                            <th>DNI</th>
                            <th>Teléfono</th>
                            <th>Email</th>
                            <th>Acciones</th>
                        </tr>
                    </thead>
                    <tbody>
                    </tbody>
                </table>
            </div>
        </section>
    </main>

    <!-- Scripts -->
    <script src="../config/supabase.js"></script>
    <script src="../scripts/validaciones.js"></script>
    <script type="module" src="../config/api.js"></script>
<script src="../scripts/app.js"></script>
</body>
</html>
