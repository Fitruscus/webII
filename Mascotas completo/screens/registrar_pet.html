<!DOCTYPE html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Registrar Mascota</title>
    <link rel="icon" href="../assets/img/doguitoadm.svg" type="image/x-icon" />
    <link
      href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400&display=swap"
      rel="stylesheet"
    />
    <link
      href="https://fonts.googleapis.com/css2?family=Pacifico&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="../assets/css/base/base.css" />
    <link rel="stylesheet" href="../assets/css/componentes/header.css" />
    <link rel="stylesheet" href="../assets/css/componentes/form.css" />
    <link rel="stylesheet" href="../assets/css/componentes/table.css" />
    <link rel="stylesheet" href="../assets/css/registrar_pet.css" />
  </head>
  <body>
    <header class="header container">
      <img
        src="../assets/img/doguitoadm.svg"
        alt="Logotipo Doguito"
        class="header__logo"
      />
      <nav>
        <ul class="header__list-nav">
          <li class="header__link"><a href="vistas.html">Vistas</a></li>
          <li class="header__link"><a href="lista_producto.html">Productos</a></li>
          <li class="header__link"><a href="lista_cliente.html">Clientes</a></li>
          <li class="header__link"><a href="lista_pet.html">Mascotas</a></li>
        </ul>
      </nav>
    </header>

    <main class="form-container">
      <h1 class="form-title">Registrar Nueva Mascota</h1>
      <form class="form" data-form>
        <div class="form-group">
          <label for="nombre" class="form-label">Nombre</label>
          <input type="text" id="nombre" class="form-input" data-nombre required>
        </div>
        
        <div class="form-group">
          <label for="especie" class="form-label">Especie de la mascota</label>
          <select id="especie" class="form-input" data-especie required>
            <option value="perro">Perro</option>
            <option value="gato">Gato</option>
            <option value="ave">Ave</option>
            <option value="roedor">Roedor</option>
            <option value="reptil">Reptil</option>
            <option value="otro">Otro</option>
          </select>
        </div>
        
        <div class="form-group">
          <label for="edad" class="form-label">Edad</label>
          <input type="number" id="edad" class="form-input" data-edad required min="0" max="30">
        </div>
        
        <div class="form-group">
          <label for="fecha-nacimiento" class="form-label">Fecha de Nacimiento</label>
          <input type="date" id="fecha-nacimiento" class="form-input" data-fecha-nacimiento required>
        </div>
        
        <div class="form-group">
          <label class="form-label">Sexo</label>
          <div class="form-radio-group">
            <label class="form-radio-label">
              <input type="radio" name="sexo" value="macho" data-sexo checked>
              Macho
            </label>
            <label class="form-radio-label">
              <input type="radio" name="sexo" value="hembra" data-sexo>
              Hembra
            </label>
          </div>
        </div>
        
        <div class="form-group">
          <label for="id-dueno" class="form-label">Dueño</label>
          <select id="id-dueno" class="form-input" data-id-dueno>
            <option value="">Cargando dueños...</option>
          </select>
        </div>
        
        <div class="form-buttons">
          <button type="submit" class="simple-button simple-button--add">Guardar</button>
          <a href="lista_pet.html" class="simple-button">Cancelar</a>
        </div>
      </form>
    </main>
  </body>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/uuid/8.3.2/uuid.min.js" integrity="sha512-UNM1njAgOFUa74Z0bADwAq8gbTcqZC8Ej4xPSzpnh0l6KMevwvkBvbldF9uR++qKeJ+MOZHRjV1HZjoRvjDfNQ==" crossorigin="anonymous" referrerpolicy="no-referrer"></script>
  <script type="module" src="../controllers/registro_pet_controller.js"></script>
</html>
