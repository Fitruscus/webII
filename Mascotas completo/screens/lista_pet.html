<!DOCTYPE html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Lista de Mascotas</title>
    <link rel="icon" href="../assets/img/doguitoadm.svg" type="image/x-icon" />
    <link
      href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400&display=swap"
      rel="stylesheet"
    />
    <link
      href="https://fonts.googleapis.com/css2?family=Pacifico&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="../assets/css/base/base.css" />
    <link rel="stylesheet" href="../assets/css/componentes/header.css" />
    <link rel="stylesheet" href="../assets/css/componentes/table.css" />
    <link rel="stylesheet" href="../assets/css/componentes/button.css" />
    <link rel="stylesheet" href="../assets/css/componentes/modal.css" />
    <link rel="stylesheet" href="../assets/css/buscadores/buscadorPets.css" />
    <link rel="stylesheet" href="../assets/css/lista_pet.css">
  </head>
  <body>
    <header class="header container">
      <img
        src="../assets/img/doguitoadm.svg"
        alt="Logotipo Doguito"
        class="header__logo"
      />
      <nav>
        <ul class="header__list-nav">
          <li class="header__link"><a href="vistas.html">Vistas</a></li>
          <li class="header__link"><a href="lista_producto.html">Productos</a></li>
          <li class="header__link"><a href="lista_cliente.html">Clientes</a></li>
          <li class="header__link"><a href="lista_pet.html">Mascotas</a></li>
        </ul>
      </nav>
    </header>

    <main class="pets-container">
      <div class="search-container-pets">
        <h1 class="pets-container__title">Buscar Mascotas</h1>
        <div class="search-box-pets">
          <input type="text" class="pets-container__buscador" placeholder="Buscar por nombre de mascota..." data-buscador>
          <select class="filter-combobox-pets" data-comboBox>
            <option value="nombre">BUSCAR POR NOMBRE</option>
            <option value="especie">BUSCAR POR ESPECIE</option>
            <option value="edad">BUSCAR POR EDAD</option>
            <option value="fecha_nacimiento">BUSCAR POR FECHA NACIMIENTO</option>
            <option value="sexo">BUSCAR POR SEXO</option>
            <option value="id_dueno">BUSCAR POR DUEÑO</option>
          </select>
        </div>
      </div>
      <table class="table-pets">
        <thead>
          <tr>
            <th class="table-pets__column--m">Nombre</th>
            <th class="table-pets__column--m">Especie</th>
            <th class="table-pets__column--s">Edad</th>
            <th class="table-pets__column--m">Fecha Nacimiento</th>
            <th class="table-pets__column--s">Sexo</th>
            <th class="table-pets__column--m">Dueño</th>
            <th class="table-pets__column--b table-pets__align--right">
              <a href="registrar_pet.html" class="simple-button simple-button--add">
                Nueva Mascota
              </a>
            </th>
          </tr>
        </thead>
        <tbody data-table>
          <!-- Los datos se cargarán dinámicamente -->
        </tbody>
      </table>      
      <div class="modal-container modal--close">
        <article class="modal">
          <h2 class="modal__title">Eliminar Mascota</h2>
          <button class="modal__close">X</button>
          <p class="modal__text">¿Estás seguro de eliminar esta mascota?</p>
          <div class="modal__button-container">
            <button class="modal__button modal__button--confirm">
              Eliminar
            </button>
            <button class="modal__button">Cancelar</button>
          </div>
        </article>
      </div>
    </main>
  </body>
  <script type="module" src="../controllers/pet_controller.js"></script>
  <script type="module" src="../controllers/buscar_pet.js"></script>
</html>
