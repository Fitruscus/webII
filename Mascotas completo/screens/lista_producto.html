<!DOCTYPE html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Lista de Productos</title>
    <link rel="icon" href="../assets/img/doguitoadm.svg" type="image/x-icon" />
    <link
      href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400&display=swap"
      rel="stylesheet"
    />
    <link
      href="https://fonts.googleapis.com/css2?family=Pacifico&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="../assets/css/base/base.css" />
    <link rel="stylesheet" href="../assets/css/componentes/header.css" />
    <link rel="stylesheet" href="../assets/css/componentes/table.css" />
    <link rel="stylesheet" href="../assets/css/componentes/button.css" />
    <link rel="stylesheet" href="../assets/css/componentes/modal.css" />
    <link rel="stylesheet" href="../assets/css/buscadores/buscadorProductos.css" />
    <link rel="stylesheet" href="../assets/css/lista_producto.css">
  </head>
  <body>
    <header class="header container">
      <img
        src="../assets/img/doguitoadm.svg"
        alt="Logotipo Doguito"
        class="header__logo"
      />
      <nav>
        <ul class="header__list-nav">
          <li class="header__link"><a href="vistas.html">Vistas</a></li>
          <li class="header__link"><a href="lista_producto.html">Productos</a></li>
          <li class="header__link"><a href="lista_cliente.html">Clientes</a></li>
          <li class="header__link"><a href="lista_pet.html">Mascotas</a></li>
        </ul>
      </nav>
    </header>

    <main class="productos-container">
      <div class="search-container-productos">
        <h1 class="productos-container__title">Busca a los Productos</h1>
        <div class="search-box-productos">
          <input type="text" class="productos-container__buscador" placeholder="Elige el tipo de busqueda ->" data-buscador>
          <select class="filter-combobox-productos" data-comboBox>
            <option value="nombre">BUSCAR POR NOMBRE</option>
            <option value="precio">BUSCAR POR PRECIO</option>
            <option value="descripcion">BUSCAR POR DESCRIPCION</option>
          </select>
        </div>
      </div>
      <table class="table-productos">
        <thead>
          <tr>
            <th class="table-productos__column--p">Nombre</th>
            <th class="table-productos__column--g">Descripción</th>
            <th class="table-productos__column--m">Precio</th>
            <th class="table-productos__column--b table-productos__align--right">
              <a href="registrar_producto.html" class="simple-button simple-button--add">
                Nuevo Producto
              </a>
            </th>
          </tr>
        </thead>
        <tbody data-table>

        </tbody>
      </table>      
      <div class="modal-container modal--close">
        <article class="modal">
          <h2 class="modal__title">Eliminar</h2>
          <button class="modal__close">X</button>
          <p class="modal__text">¿Deseas continuar?</p>
          <div class="modal__button-container">
            <button class="modal__button modal__button--confirm">
              Eliminar
            </button>
            <button class="modal__button">No eliminar</button>
          </div>
        </article>
      </div>
    </main>
  </body>
  <script type="module" src="../controllers/product_controller.js"></script>
  <script type="module" src="../controllers/buscar_productos.js"></script>
</html>
